<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jolly+Lodger&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_w.css">
    <script src="watchlist.js" defer></script>
    <title>Watchlist</title>
</head>
<body>
    <div class="header">
        <h1>My watchlist</h1>
        <input type="text" name="" id="" class="inputbox" placeholder="Search by title. . .">
    </div>
    <div class="output">

    </div>

    <div class="indivicontainer">
        <div class="indiviheader">
            <button class="about">About</button>
            <button class="plot">Plot</button>
            <button class="cast">Cast</button>
            <button class="awards">Awards</button>
            <button class="ratings">Ratings</button>
            <button class="closebtn">X</button>
        </div>
        <div class="individetails">
            <div id="about"></div>
            <div id="plot"></div>
            <div id="cast"></div>
            <div id="awards"></div>
            <div id="ratings"></div>
        </div>
    </div>
</body>
</html>
